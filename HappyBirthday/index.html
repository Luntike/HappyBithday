<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>С Днём Рождения, Ваня!</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="floating-hearts"></div>

<div class="container">

    <!-- КОНВЕРТ -->
    <div class="envelope-wrapper" id="envelopeWrapper">

        <div class="envelope" onclick="openLetter()">

            <!-- Верх -->
            <div class="envelope-top"></div>

            <!-- Бумага -->
            <div class="paper">

                <div class="mail-icon">
                    💌
                </div>

                <div class="arrow">
                    ↓
                </div>

                <button class="open-btn">
                    Открыть
                </button>

            </div>

            <!-- Левая часть -->
            <div class="left-fold"></div>

            <!-- Правая часть -->
            <div class="right-fold"></div>

            <!-- Низ -->
            <div class="bottom-fold"></div>

            <!-- Сердце -->
            <div class="heart">
                ❤️
            </div>

        </div>

    </div>

    <!-- ОТКРЫТКА -->
    <div class="card" id="card">

        <div class="decor decor1">💖</div>
        <div class="decor decor2">✨</div>
        <div class="decor decor3">⭐</div>

        <h1>
            С Днём Рождения,<br>
            Ваня!
        </h1>

        <div class="cake">
            🎂
        </div>

        <div class="line"></div>

        <p>
            Желаю тебе счастья, здоровья,
            огромной удачи и исполнения всех мечт! ✨
        </p>

        <div class="line"></div>

        <p>
            Пусть каждый день будет ярким,
            весёлым и приносит только хорошие эмоции 😎
        </p>

        <div class="line"></div>

        <p>
            Оставайся таким же крутым человеком! 💪
        </p>

        <div class="bottom-icons">
            🎁 🎈
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
